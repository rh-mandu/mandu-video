service: mandu-video-save

build:
  esbuild:
    bundle: true
    platform: node
    target: node20
    format: cjs
    external:
      - fluent-ffmpeg

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-northeast-2
  timeout: 300 # ⏳ 타임아웃을 6초에서 30초로 늘림 (미디어 처리 대비)
  memorySize: 512 # 미디어 처리 시 메모리가 부족하면 속도가 느려지므로 증설 권장
  environment:
    PGUSER: ${env:PGUSER}
    PGPASSWORD: ${env:PGPASSWORD}
    PGPORT: ${env:PGPORT}
    PGHOST: ${env:PGHOST}
    PGDATABASE: ${env:PGDATABASE}
    CURRENT_SCHEMA: ${env:CURRENT_SCHEMA}
    HTTPS_PROXY_URL: ${env:HTTPS_PROXY_URL}

  vpc:
    securityGroupIds:
      - ${env:SECURITY_GROUP_ID}
    subnetIds:
      - ${env:SUBNET_ID}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource: "arn:aws:s3:::${env:S3_BUCKET}/*"

#        - Effect: Allow
#          Action:
#            - mediaconvert:CreateJob
#            - mediaconvert:GetJob
#            - mediaconvert:DescribeEndpoints
#          Resource: "*"

        - Effect: Allow
          Action:
            - iam:PassRole
          Resource:
            - arn:aws:iam::${env:AWS_ACCOUNT_ID}:role/service-role/MediaConvert_Default_Role

        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
            - ec2:AssignPrivateIpAddresses
            - ec2:UnassignPrivateIpAddresses
          Resource: "*"

        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - "arn:aws:lambda:ap-northeast-2:${env:AWS_ACCOUNT_ID}:function:${env:THUMBNAIL_LAMBDA_NAME}"


functions:
  handle:
    handler: src/handler.handle
    layers:
      - arn:aws:lambda:ap-northeast-2:${env:AWS_ACCOUNT_ID}:layer:${env:FFMPEG_LAYER_NAME}
    events:
      - httpApi:
          path: /video
          method: post

plugins:
  - serverless-offline
custom:
  serverless-offline:
    useDocker: true
